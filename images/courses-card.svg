<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1208;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0f0d08;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#120e06;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8d5b0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c9a96e;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:#c9a96e;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#c9a96e;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="500" fill="url(#bg)"/>
  <rect width="400" height="500" fill="url(#glow)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="100" x2="400" y2="100" stroke="#c9a96e" stroke-width="0.3" stroke-opacity="0.15"/>
  <line x1="0" y1="200" x2="400" y2="200" stroke="#c9a96e" stroke-width="0.3" stroke-opacity="0.1"/>
  <line x1="0" y1="300" x2="400" y2="300" stroke="#c9a96e" stroke-width="0.3" stroke-opacity="0.1"/>
  <line x1="100" y1="0" x2="100" y2="500" stroke="#c9a96e" stroke-width="0.3" stroke-opacity="0.1"/>
  <line x1="300" y1="0" x2="300" y2="500" stroke="#c9a96e" stroke-width="0.3" stroke-opacity="0.1"/>

  <!-- Makeup brush 1 (large, center-left) -->
  <g transform="rotate(-20, 160, 260)">
    <rect x="153" y="100" width="14" height="200" rx="7" fill="#c9a96e" opacity="0.9"/>
    <ellipse cx="160" cy="100" rx="14" ry="8" fill="#e8d5b0" opacity="0.95"/>
    <ellipse cx="160" cy="92" rx="11" ry="22" fill="#d4b896" opacity="0.8"/>
    <ellipse cx="160" cy="78" rx="8" ry="12" fill="#e8d5b0" opacity="0.9"/>
    <rect x="155" y="295" width="10" height="20" rx="5" fill="#8a6a3a" opacity="0.8"/>
  </g>

  <!-- Makeup brush 2 (medium, right) -->
  <g transform="rotate(15, 250, 240)">
    <rect x="243" y="120" width="10" height="160" rx="5" fill="#c9a96e" opacity="0.7"/>
    <ellipse cx="248" cy="120" rx="10" ry="6" fill="#e8d5b0" opacity="0.85"/>
    <ellipse cx="248" cy="113" rx="8" ry="18" fill="#d4b896" opacity="0.75"/>
    <ellipse cx="248" cy="102" rx="6" ry="10" fill="#e8d5b0" opacity="0.8"/>
    <rect x="244" y="276" width="8" height="16" rx="4" fill="#8a6a3a" opacity="0.7"/>
  </g>

  <!-- Makeup brush 3 (small, far left) -->
  <g transform="rotate(-35, 100, 280)">
    <rect x="95" y="160" width="8" height="130" rx="4" fill="#c9a96e" opacity="0.5"/>
    <ellipse cx="99" cy="160" rx="8" ry="5" fill="#e8d5b0" opacity="0.7"/>
    <ellipse cx="99" cy="154" rx="6" ry="14" fill="#d4b896" opacity="0.6"/>
    <ellipse cx="99" cy="146" rx="4" ry="8" fill="#e8d5b0" opacity="0.65"/>
  </g>

  <!-- Open book / notebook -->
  <g transform="translate(120, 340)">
    <rect x="0" y="0" width="160" height="110" rx="4" fill="#1e180a" stroke="#c9a96e" stroke-width="1" stroke-opacity="0.4"/>
    <line x1="80" y1="0" x2="80" y2="110" stroke="#c9a96e" stroke-width="1" stroke-opacity="0.3"/>
    <!-- Lines on left page -->
    <line x1="12" y1="20" x2="68" y2="20" stroke="#c9a96e" stroke-width="0.8" stroke-opacity="0.4"/>
    <line x1="12" y1="32" x2="68" y2="32" stroke="#c9a96e" stroke-width="0.8" stroke-opacity="0.3"/>
    <line x1="12" y1="44" x2="68" y2="44" stroke="#c9a96e" stroke-width="0.8" stroke-opacity="0.3"/>
    <line x1="12" y1="56" x2="68" y2="56" stroke="#c9a96e" stroke-width="0.8" stroke-opacity="0.25"/>
    <line x1="12" y1="68" x2="55" y2="68" stroke="#c9a96e" stroke-width="0.8" stroke-opacity="0.25"/>
    <!-- Lines on right page -->
    <line x1="92" y1="20" x2="148" y2="20" stroke="#c9a96e" stroke-width="0.8" stroke-opacity="0.4"/>
    <line x1="92" y1="32" x2="148" y2="32" stroke="#c9a96e" stroke-width="0.8" stroke-opacity="0.3"/>
    <line x1="92" y1="44" x2="148" y2="44" stroke="#c9a96e" stroke-width="0.8" stroke-opacity="0.3"/>
    <line x1="92" y1="56" x2="148" y2="56" stroke="#c9a96e" stroke-width="0.8" stroke-opacity="0.25"/>
    <!-- Small star on right page -->
    <text x="120" y="85" font-family="serif" font-size="18" fill="#c9a96e" text-anchor="middle" opacity="0.6">✦</text>
  </g>

  <!-- Decorative gold circle -->
  <circle cx="320" cy="80" r="40" fill="none" stroke="#c9a96e" stroke-width="0.5" stroke-opacity="0.2"/>
  <circle cx="320" cy="80" r="28" fill="none" stroke="#c9a96e" stroke-width="0.5" stroke-opacity="0.15"/>
  <text x="320" y="87" font-family="serif" font-size="22" fill="#c9a96e" text-anchor="middle" opacity="0.5">✦</text>

  <!-- Bottom decorative line -->
  <line x1="80" y1="470" x2="320" y2="470" stroke="url(#gold)" stroke-width="0.8" stroke-opacity="0.3"/>
</svg>

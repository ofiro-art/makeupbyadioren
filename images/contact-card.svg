<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#180f08;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#100c07;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1208;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gold2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8d5b0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c9a96e;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="55%">
      <stop offset="0%" style="stop-color:#c9a96e;stop-opacity:0.12" />
      <stop offset="100%" style="stop-color:#c9a96e;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="500" fill="url(#bg2)"/>
  <rect width="400" height="500" fill="url(#glow2)"/>

  <!-- Decorative corner ornaments -->
  <line x1="30" y1="30" x2="80" y2="30" stroke="#c9a96e" stroke-width="0.8" stroke-opacity="0.3"/>
  <line x1="30" y1="30" x2="30" y2="80" stroke="#c9a96e" stroke-width="0.8" stroke-opacity="0.3"/>
  <line x1="320" y1="30" x2="370" y2="30" stroke="#c9a96e" stroke-width="0.8" stroke-opacity="0.3"/>
  <line x1="370" y1="30" x2="370" y2="80" stroke="#c9a96e" stroke-width="0.8" stroke-opacity="0.3"/>
  <line x1="30" y1="470" x2="80" y2="470" stroke="#c9a96e" stroke-width="0.8" stroke-opacity="0.3"/>
  <line x1="30" y1="420" x2="30" y2="470" stroke="#c9a96e" stroke-width="0.8" stroke-opacity="0.3"/>
  <line x1="320" y1="470" x2="370" y2="470" stroke="#c9a96e" stroke-width="0.8" stroke-opacity="0.3"/>
  <line x1="370" y1="420" x2="370" y2="470" stroke="#c9a96e" stroke-width="0.8" stroke-opacity="0.3"/>

  <!-- Large decorative star top center -->
  <text x="200" y="100" font-family="serif" font-size="36" fill="#c9a96e" text-anchor="middle" opacity="0.35">✦</text>

  <!-- Calendar / booking card -->
  <g transform="translate(70, 140)">
    <!-- Calendar body -->
    <rect x="0" y="0" width="260" height="200" rx="6" fill="#1e160a" stroke="#c9a96e" stroke-width="1" stroke-opacity="0.35"/>
    <!-- Calendar header -->
    <rect x="0" y="0" width="260" height="44" rx="6" fill="#c9a96e" fill-opacity="0.15"/>
    <rect x="0" y="38" width="260" height="6" fill="#c9a96e" fill-opacity="0.08"/>
    <!-- Header text -->
    <text x="130" y="28" font-family="Georgia, serif" font-size="13" fill="#e8d5b0" text-anchor="middle" letter-spacing="4" opacity="0.9">BOOK A SESSION</text>
    <!-- Calendar hook left -->
    <rect x="60" y="-8" width="8" height="20" rx="4" fill="#c9a96e" opacity="0.5"/>
    <!-- Calendar hook right -->
    <rect x="192" y="-8" width="8" height="20" rx="4" fill="#c9a96e" opacity="0.5"/>

    <!-- Day grid -->
    <!-- Row 1 -->
    <circle cx="33" cy="80" r="14" fill="#c9a96e" fill-opacity="0.08" stroke="#c9a96e" stroke-width="0.5" stroke-opacity="0.2"/>
    <text x="33" y="85" font-family="serif" font-size="11" fill="#c9a96e" text-anchor="middle" opacity="0.5">3</text>
    <circle cx="75" cy="80" r="14" fill="#c9a96e" fill-opacity="0.08" stroke="#c9a96e" stroke-width="0.5" stroke-opacity="0.2"/>
    <text x="75" y="85" font-family="serif" font-size="11" fill="#c9a96e" text-anchor="middle" opacity="0.5">4</text>
    <circle cx="117" cy="80" r="14" fill="#c9a96e" fill-opacity="0.25" stroke="#c9a96e" stroke-width="1" stroke-opacity="0.6"/>
    <text x="117" y="85" font-family="serif" font-size="12" fill="#e8d5b0" text-anchor="middle" font-weight="bold" opacity="0.95">7</text>
    <circle cx="159" cy="80" r="14" fill="#c9a96e" fill-opacity="0.08" stroke="#c9a96e" stroke-width="0.5" stroke-opacity="0.2"/>
    <text x="159" y="85" font-family="serif" font-size="11" fill="#c9a96e" text-anchor="middle" opacity="0.5">9</text>
    <circle cx="201" cy="80" r="14" fill="#c9a96e" fill-opacity="0.08" stroke="#c9a96e" stroke-width="0.5" stroke-opacity="0.2"/>
    <text x="201" y="85" font-family="serif" font-size="11" fill="#c9a96e" text-anchor="middle" opacity="0.5">11</text>
    <circle cx="243" cy="80" r="14" fill="#c9a96e" fill-opacity="0.08" stroke="#c9a96e" stroke-width="0.5" stroke-opacity="0.2"/>
    <text x="243" y="85" font-family="serif" font-size="11" fill="#c9a96e" text-anchor="middle" opacity="0.5">12</text>

    <!-- Row 2 -->
    <circle cx="33" cy="130" r="14" fill="#c9a96e" fill-opacity="0.08" stroke="#c9a96e" stroke-width="0.5" stroke-opacity="0.2"/>
    <text x="33" y="135" font-family="serif" font-size="11" fill="#c9a96e" text-anchor="middle" opacity="0.5">14</text>
    <circle cx="75" cy="130" r="14" fill="#c9a96e" fill-opacity="0.08" stroke="#c9a96e" stroke-width="0.5" stroke-opacity="0.2"/>
    <text x="75" y="135" font-family="serif" font-size="11" fill="#c9a96e" text-anchor="middle" opacity="0.5">16</text>
    <circle cx="117" cy="130" r="14" fill="#c9a96e" fill-opacity="0.08" stroke="#c9a96e" stroke-width="0.5" stroke-opacity="0.2"/>
    <text x="117" y="135" font-family="serif" font-size="11" fill="#c9a96e" text-anchor="middle" opacity="0.5">18</text>
    <circle cx="159" cy="130" r="14" fill="#c9a96e" fill-opacity="0.3" stroke="#e8d5b0" stroke-width="1.5" stroke-opacity="0.7"/>
    <text x="159" y="135" font-family="serif" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="bold" opacity="0.95">21</text>
    <circle cx="201" cy="130" r="14" fill="#c9a96e" fill-opacity="0.08" stroke="#c9a96e" stroke-width="0.5" stroke-opacity="0.2"/>
    <text x="201" y="135" font-family="serif" font-size="11" fill="#c9a96e" text-anchor="middle" opacity="0.5">23</text>
    <circle cx="243" cy="130" r="14" fill="#c9a96e" fill-opacity="0.08" stroke="#c9a96e" stroke-width="0.5" stroke-opacity="0.2"/>
    <text x="243" y="135" font-family="serif" font-size="11" fill="#c9a96e" text-anchor="middle" opacity="0.5">25</text>

    <!-- Row 3 -->
    <circle cx="75" cy="180" r="14" fill="#c9a96e" fill-opacity="0.08" stroke="#c9a96e" stroke-width="0.5" stroke-opacity="0.2"/>
    <text x="75" y="185" font-family="serif" font-size="11" fill="#c9a96e" text-anchor="middle" opacity="0.5">28</text>
    <circle cx="117" cy="180" r="14" fill="#c9a96e" fill-opacity="0.08" stroke="#c9a96e" stroke-width="0.5" stroke-opacity="0.2"/>
    <text x="117" y="185" font-family="serif" font-size="11" fill="#c9a96e" text-anchor="middle" opacity="0.5">29</text>
    <circle cx="159" cy="180" r="14" fill="#c9a96e" fill-opacity="0.08" stroke="#c9a96e" stroke-width="0.5" stroke-opacity="0.2"/>
    <text x="159" y="185" font-family="serif" font-size="11" fill="#c9a96e" text-anchor="middle" opacity="0.5">30</text>
  </g>

  <!-- Envelope / message icon below calendar -->
  <g transform="translate(150, 365)">
    <rect x="0" y="0" width="100" height="70" rx="4" fill="none" stroke="#c9a96e" stroke-width="1" stroke-opacity="0.4"/>
    <polyline points="0,0 50,38 100,0" fill="none" stroke="#c9a96e" stroke-width="1" stroke-opacity="0.4"/>
    <line x1="0" y1="70" x2="35" y2="38" stroke="#c9a96e" stroke-width="1" stroke-opacity="0.3"/>
    <line x1="100" y1="70" x2="65" y2="38" stroke="#c9a96e" stroke-width="1" stroke-opacity="0.3"/>
  </g>

  <!-- Bottom tagline -->
  <text x="200" y="458" font-family="Georgia, serif" font-size="9" fill="#c9a96e" text-anchor="middle" letter-spacing="4" opacity="0.4">ADI OREN · SINGAPORE</text>
</svg>
